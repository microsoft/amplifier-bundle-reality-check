# End-to-end reality check pipeline.
#
# Required bundles: reality-check, digital-twin-universe, terminal-tester
# Required CLIs:    amplifier-reality-check (this bundle), amplifier-digital-twin,
#                   amplifier-gitea (if local repos), agent-browser (web apps),
#                   tmux (terminal apps)

name: reality-check-pipeline
description: >
  Derives acceptance tests from user intent (with a CLI-validated convergence
  loop), deploys software in a Digital Twin Universe environment, runs browser
  and/or terminal verification, and produces a gap analysis report with an
  HTML artifact.
version: 0.2.0

context:
  spec_path: ""                # Path to spec / requirements file
  conversation_path: ""        # Path to conversation history file (optional)
  software_path: ""            # Path to the software repo or directory to test
  output_dir: "./reality-check-output"  # Root directory for all outputs
  software_description: ""     # Optional hint for DTU (e.g. "FastAPI web app, needs ANTHROPIC_API_KEY, port 8410")

  # Acceptance-tests location, treated as the recipe's source of truth for
  # the path the CLI validates and downstream steps consume. Defaults inside
  # the default `output_dir`; override independently if you change `output_dir`.
  acceptance_tests_path: "./reality-check-output/acceptance-tests"

  # Convergence state for the intent-analysis loop. `validated` flips to
  # "true" the first iteration the CLI exits 0; `previous_errors` carries
  # the CLI's failure output forward into the next agent attempt.
  validated: "false"
  previous_errors: ""

  # Convergence state for the report loop. Same shape as the intent loop;
  # tracked separately so the two loops don't collide.
  report_validated: "false"
  report_previous_errors: ""

steps:
  # ------------------------------------------------------------------
  # 1. Intent Analysis (CLI-validated convergence loop)
  #    Iterates intent-iteration.yaml (intent-analyzer + CLI validator)
  #    until `amplifier-reality-check validate-acceptance-tests` exits 0.
  #    Capped at 3 attempts; subsequent guard step fails the recipe if
  #    convergence is not reached.
  # ------------------------------------------------------------------
  - id: intent-loop
    type: "recipe"
    recipe: "./intent-iteration.yaml"
    context:
      spec_path: "{{spec_path}}"
      conversation_path: "{{conversation_path}}"
      software_path: "{{software_path}}"
      acceptance_tests_path: "{{acceptance_tests_path}}"
      previous_errors: "{{previous_errors}}"
    output: "iteration_result"
    parse_json: true
    timeout: 1200
    on_error: "continue"
    while_condition: "{{validated}} != true"
    max_while_iterations: 3
    break_when: "{{validated}} == true"
    update_context:
      validated: "{{iteration_result.validation_result.validated}}"
      previous_errors: "{{iteration_result.validation_result.errors}}"

  # ------------------------------------------------------------------
  # 1b. Convergence guard
  #     Fails the recipe if the loop exhausted its 3 attempts without
  #     the CLI ever exiting 0. Per-iteration error output is in the
  #     prior step logs; we do not re-echo it here.
  # ------------------------------------------------------------------
  - id: ensure-validated
    type: "bash"
    command: |
      if [ "{{validated}}" != "true" ]; then
        echo "ERROR: acceptance tests at {{acceptance_tests_path}} failed CLI validation after 3 iterations." >&2
        echo "See the validate-tests step output in earlier iterations for the pydantic errors." >&2
        exit 1
      fi
      echo "Acceptance tests validated: {{acceptance_tests_path}}"

  # ------------------------------------------------------------------
  # 2. DTU Launch
  #    Explores the software, generates a DTU profile, launches the
  #    environment, and returns access details (URL, environment ID).
  # ------------------------------------------------------------------
  - id: dtu-launch
    agent: "digital-twin-universe:dtu-profile-builder"
    prompt: |
      The software at {{software_path}} needs to be deployed in a Digital Twin
      Universe environment for testing.

      {{software_description}}

      Generate a DTU profile, launch the environment, and return access details.
      Save the profile to {{software_path}}/.amplifier/digital-twin-universe/profiles/

      Validated acceptance tests for this software live at:
      {{acceptance_tests_path}}
    output: "dtu_result"
    timeout: 1800

  # ------------------------------------------------------------------
  # 3a. Terminal Validation
  #     Runs cli-type acceptance tests via terminal_inspector inside
  #     the DTU. Exits immediately if no cli tests exist.
  # ------------------------------------------------------------------
  - id: terminal-validation
    agent: "reality-check:terminal-tester"
    prompt: |
      Run terminal tests against the deployed application.

      Acceptance tests path: {{acceptance_tests_path}}
      Screenshot directory: {{output_dir}}/screenshots/

      The DTU environment was launched with these details:
      {{dtu_result}}

      The acceptance tests path can be a single YAML file or a directory
      of YAML files. If it is a directory, recursively discover all
      *.yaml files and collect tests from all of them.

      If there are NO tests with type: cli across all files, respond
      with "No cli tests found. Skipping." and stop.

      Otherwise, run every cli-type test using the DTU bridge pattern
      (amplifier-digital-twin exec <id> without --).
    output: "terminal_results"
    timeout: 1800

  # ------------------------------------------------------------------
  # 3b. Browser Validation
  #     Runs browser-type acceptance tests via agent-browser against
  #     the DTU. Exits immediately if no browser tests exist.
  # ------------------------------------------------------------------
  - id: browser-validation
    agent: "reality-check:browser-tester"
    prompt: |
      Run browser tests against the deployed application.

      Acceptance tests path: {{acceptance_tests_path}}
      Screenshot directory: {{output_dir}}/screenshots/

      The DTU environment was launched with these details:
      {{dtu_result}}

      The acceptance tests path can be a single YAML file or a directory
      of YAML files. If it is a directory, recursively discover all
      *.yaml files and collect tests from all of them.

      If there are NO tests with type: browser across all files, respond
      with "No browser tests found. Skipping." and stop.

      Otherwise, extract the access URL from the DTU details and run
      every browser-type test against it.
    output: "browser_results"
    timeout: 1800

  # ------------------------------------------------------------------
  # 3c. Generic Validation (catch-all)
  #     Handles `type: other` acceptance tests -- the catch-all for
  #     anything that doesn't fit the specialized browser or cli
  #     validators (API services, libraries, file-system effects, etc.).
  #     Uses bash/curl inside the DTU. Exits immediately if no
  #     `other`-type tests exist. The agent is named `generic-tester`
  #     because it acts as the generalist; the test type is `other`.
  # ------------------------------------------------------------------
  - id: generic-validation
    agent: "reality-check:generic-tester"
    prompt: |
      Run `other`-type tests against the deployed application.

      Acceptance tests path: {{acceptance_tests_path}}

      The DTU environment was launched with these details:
      {{dtu_result}}

      The acceptance tests path can be a single YAML file or a directory
      of YAML files. If it is a directory, recursively discover all
      *.yaml files and collect tests from all of them.

      If there are NO tests with type: other across all files, respond
      with "No `other`-type tests found. Skipping." and stop.

      Otherwise, run every `other`-type test using the DTU bridge pattern
      (amplifier-digital-twin exec <id> -- <command>).
    output: "generic_results"
    timeout: 1200

  # ------------------------------------------------------------------
  # 4. Report (CLI-validated convergence loop)
  #    Iterates report-iteration.yaml (report agent + CLI validator)
  #    until `amplifier-reality-check validate-report` exits 0.
  #    Capped at 3 attempts; subsequent guard step fails the recipe if
  #    convergence is not reached.
  #
  #    Files produced:
  #      - {{output_dir}}/report/report.raw.yaml  (agent, slim raw schema)
  #      - {{output_dir}}/report/report.yaml      (CLI, expanded canonical)
  #      - {{output_dir}}/report/report.html      (CLI, visual artifact)
  # ------------------------------------------------------------------
  - id: report-loop
    type: "recipe"
    recipe: "./report-iteration.yaml"
    context:
      acceptance_tests_path: "{{acceptance_tests_path}}"
      output_dir: "{{output_dir}}"
      terminal_results: "{{terminal_results}}"
      browser_results: "{{browser_results}}"
      generic_results: "{{generic_results}}"
      dtu_result: "{{dtu_result}}"
      previous_errors: "{{report_previous_errors}}"
    output: "report_iteration_result"
    parse_json: true
    timeout: 1500
    on_error: "continue"
    while_condition: "{{report_validated}} != true"
    max_while_iterations: 3
    break_when: "{{report_validated}} == true"
    update_context:
      report_validated: "{{report_iteration_result.validation_result.validated}}"
      report_previous_errors: "{{report_iteration_result.validation_result.errors}}"

  # ------------------------------------------------------------------
  # 4b. Report convergence guard
  #     Fails the recipe if the loop exhausted its 3 attempts without
  #     the CLI ever exiting 0. Per-iteration error output is in the
  #     prior step logs; we do not re-echo it here.
  # ------------------------------------------------------------------
  - id: ensure-report-validated
    type: "bash"
    command: |
      if [ "{{report_validated}}" != "true" ]; then
        echo "ERROR: report at {{output_dir}}/report/report.raw.yaml failed CLI validation after 3 iterations." >&2
        echo "See the validate-report step output in earlier iterations for the structural errors." >&2
        exit 1
      fi
      echo "Report validated: {{output_dir}}/report/report.yaml"
