bundle:
  name: reality-check-behavior
  version: 0.1.0
  description: Verifies built software matches user intent through environment testing and completion verification

includes:
  - bundle: git+https://github.com/microsoft/amplifier-bundle-browser-tester@main
  - bundle: git+https://github.com/microsoft/amplifier-bundle-digital-twin-universe@main
  - bundle: git+https://github.com/microsoft/amplifier-bundle-terminal-tester@main

agents:
  include:
    - reality-check:intent-analyzer
    - reality-check:browser-tester
    - reality-check:terminal-tester
    - reality-check:report
    - browser-tester:browser-operator

context:
  include:
    - reality-check:context/reality-check-awareness.md
